name: Release C++ SDK

# Triggered by the same version tag as publish-js.yml.
# Builds platform-specific binary packages, creates a GitHub Release,
# and uploads the archives as release assets.

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protobuf (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libprotobuf-dev protobuf-compiler

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DIBRIDGER_BUILD_EXAMPLES=ON
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Install
        run: cmake --install build --config Release

      # Archive layout: ibridger-v0.2.0-linux-x64.tar.gz
      #   include/ibridger/   — public headers + proto-generated headers
      #   lib/                — libibridger_core.a, libibridger_sdk_cpp.a
      #   lib/cmake/ibridger/ — ibridgerConfig.cmake for find_package()
      #   bin/                — echo_server, echo_client (examples)
      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            PLATFORM="linux-x64"
          else
            ARCH=$(uname -m)
            PLATFORM="macos-${ARCH}"
          fi
          echo "name=ibridger-${TAG}-${PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Create archive
        run: >
          tar -czf ${{ steps.archive.outputs.name }}.tar.gz
          -C ${{ github.workspace }}/install .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.name }}.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" artifacts/*.tar.gz \
            --title "iBridger ${TAG}" \
            --generate-notes
